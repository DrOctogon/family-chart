<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Krebs Family Tree</title>
  <link rel="shortcut icon" type="image/svg" href="/examples/logo.svg">
  <script src="https://unpkg.com/d3@7"></script>
  <link rel="stylesheet" href="/src/styles/family-chart.css">
  <style> body { font-family: 'Arial', sans-serif; margin: 0; } </style>
</head>
<body>
<div id="FamilyChart" class="f3" style="width:100%;height:100vh;margin:auto;background-color:rgb(33,33,33);color:#fff;"></div>
<script type="module">
import f3 from '../../src/index.js'

fetch('../data/krebs.json')
  .then(res => res.json())
  .then(data => create(data))
  .catch(err => console.error(err))

function create(data) {
  const f3Chart = f3.createChart('#FamilyChart', data)
    .setTransitionTime(800)
    .setCardYSpacing(150)
    .setCardXSpacing(250)
    .setShowSiblingsOfMain(true)
    .setOrientationVertical()

  f3Chart.setCard(f3.cardHtml)
    .setCardDisplay([
      d => `${d.data["first name"]} ${d.data["last name"]}`,
      d => d.data["birthday"] || ''
    ])
    .setMiniTree(true)
    .setStyle('imageRect')
    .setOnHoverPathToMain()

  f3Chart.editTree()
    .setFields(["first name", "last name", "birthday", "avatar"])
    .setEditFirst(true)

  f3Chart.setPersonDropdown(d => `${d.data["first name"]} ${d.data["last name"]}`)

  // start centered on Tyler Windsor Krebs
  f3Chart.updateMainId('tyler')
  f3Chart.updateTree({ initial: true })
}
</script>
</body>
</html>
